<!DOCTYPE html>
<html lang="ja">

<meta charset="UTF-8">

<title>スポーツサイエンスデザイン 管理アプリ</title>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;color:#1a1a1a;background:#f5f5f3;min-height:100vh}
.app-wrapper{max-width:820px;margin:0 auto;padding:24px 16px}
.top-tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid #ddd}
.top-tab{padding:12px 24px;font-size:15px;font-weight:500;cursor:pointer;border:none;background:none;color:#888;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s}
.top-tab.active{color:#1a1a1a;border-bottom-color:#185FA5}
.top-tab:hover{color:#1a1a1a}
.top-tab i{margin-right:6px;font-size:16px}
.income-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px}
.income-table th{background:#f0f0ee;padding:8px 10px;text-align:left;font-weight:500;font-size:12px;color:#666;border-bottom:1px solid #ddd}
.income-table td{padding:7px 10px;border-bottom:.5px solid #eee}
.income-table tr:hover td{background:#fafaf8}
.income-table .amount{text-align:right;font-weight:500}
.income-table .total-row td{font-weight:500;border-top:2px solid #ddd;background:#f8f8f6}
.month-card{background:#fff;border:.5px solid #e0e0e0;border-radius:12px;padding:16px 20px;margin-bottom:16px}
.month-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;cursor:pointer}
.month-header h3{font-size:16px;font-weight:500}
.month-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.month-summary .ms{background:#f8f8f6;border-radius:8px;padding:10px;text-align:center}
.month-summary .ms-label{font-size:11px;color:#888}
.month-summary .ms-value{font-size:18px;font-weight:500;margin-top:2px}
.income-form-row{display:grid;grid-template-columns:100px 40px 120px 90px 1fr 40px;gap:6px;align-items:center;margin-bottom:4px;font-size:12px}
.income-form-row input,.income-form-row select{font-size:12px;padding:4px 6px}
.app-header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.app-header h1{font-size:20px;font-weight:500}
.app-header .subtitle{font-size:13px;color:#888}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:16px}
.stat{background:#fff;border-radius:10px;padding:14px;border:.5px solid #e0e0e0}
.stat-label{font-size:11px;color:#888}
.stat-value{font-size:22px;font-weight:500;margin-top:2px}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;flex-wrap:wrap}
.search-box{font-size:13px;width:220px;padding:8px 12px;border:.5px solid #ccc;border-radius:8px;outline:none;background:#fff}
.search-box:focus{border-color:#378ADD}
button{padding:8px 16px;border:.5px solid #bbb;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;color:#333;transition:background .15s}
button:hover{background:#f0f0f0}
button:active{transform:scale(.98)}
.btn-primary{background:#E6F1FB;color:#185FA5;border-color:#85B7EB}
.btn-primary:hover{background:#d0e5f7}
.btn-danger{background:#FCEBEB;color:#A32D2D;border-color:#F09595}
.btn-danger:hover{background:#f7d5d5}
.btn-success{background:#EAF3DE;color:#3B6D11;border-color:#97C459}
.btn-success:hover{background:#ddedc8}
.card{background:#fff;border:.5px solid #e0e0e0;border-radius:12px;padding:16px 20px;margin-bottom:12px}
.card-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:16px;flex-shrink:0}
.section-title{font-size:12px;color:#888;margin:18px 0 8px;padding-bottom:4px;border-bottom:.5px solid #e8e8e8;letter-spacing:.5px}
.field{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;font-size:13px;gap:12px}
.field-label{color:#888;flex-shrink:0;min-width:120px}
.field-value{text-align:right;word-break:break-word}
.badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;margin:1px 2px}
.badge-count{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;border-radius:10px;font-size:11px;font-weight:500;padding:0 6px}
.list-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fff;border:.5px solid #e0e0e0;border-radius:10px;margin-bottom:6px;cursor:pointer;transition:background .15s}
.list-item:hover{background:#f8f8f6}
.list-item .name{font-weight:500;font-size:14px}
.list-item .meta{font-size:12px;color:#888}
.free-text{background:#f8f8f6;border-radius:8px;padding:10px 12px;font-size:13px;line-height:1.7;margin-top:4px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:.5px solid #ccc;border-radius:8px;font-size:13px;outline:none;background:#fff;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#378ADD}
.form-group textarea{min-height:60px;resize:vertical}
.form-actions{display:flex;gap:8px;margin-top:20px}
.form-actions button{flex:1;padding:10px}
.checkbox-group{display:flex;flex-wrap:wrap;gap:8px}
.checkbox-group label{font-size:13px;display:flex;align-items:center;gap:4px;cursor:pointer}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#888;cursor:pointer;margin-bottom:16px;border:none;background:none;padding:0}
.back-link:hover{color:#333;background:none}
.consent-ok{color:#0F6E56}
.consent-ng{color:#A32D2D}
.health-warn{color:#A32D2D}
.empty-msg{text-align:center;color:#888;padding:2rem;font-size:13px}
.session-tab{display:inline-flex;align-items:center;gap:4px;padding:8px 14px;border:.5px solid #ddd;border-bottom:none;border-radius:8px 8px 0 0;background:#f5f5f3;cursor:pointer;font-size:13px;color:#888;margin-right:2px}
.session-tab.active{background:#fff;color:#1a1a1a;font-weight:500;border-bottom:.5px solid #fff;margin-bottom:-1px;position:relative;z-index:1}
.session-tabs{display:flex;align-items:flex-end;border-bottom:.5px solid #ddd;margin-bottom:0;padding:0 4px;flex-wrap:wrap}
.session-content{border:.5px solid #ddd;border-top:none;border-radius:0 0 12px 12px;padding:16px;background:#fff;margin-bottom:12px}
.progress-badge{display:inline-block;padding:3px 10px;border-radius:8px;font-size:11px}
.compare-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px}
.compare-col{background:#f8f8f6;border-radius:8px;padding:10px;font-size:13px}
.compare-col .col-label{font-size:11px;color:#888;margin-bottom:4px}
.review-card{background:#FBEAF0;border:.5px solid #ED93B1;border-radius:10px;padding:14px;margin-top:16px}
.review-card .rv-header{font-size:12px;color:#72243E;margin-bottom:10px;font-weight:500}
.review-card .rv-field{padding:4px 0;font-size:13px}
.review-card .rv-label{color:#993556;font-size:11px;margin-bottom:2px}
.review-card .rv-value{color:#4B1528;line-height:1.6}
.star-rating{color:#EF9F27;font-size:14px;letter-spacing:2px}
.sync-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#fff;border:.5px solid #e0e0e0;border-radius:10px;margin-bottom:16px;font-size:12px;color:#888}
.sync-bar .sync-status{display:flex;align-items:center;gap:6px}
.sync-bar .sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.sync-dot.ok{background:#97C459}
.sync-dot.saving{background:#EF9F27}
.sync-dot.error{background:#E24B4A}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(245,245,243,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;font-size:15px;color:#888}
.loading-overlay .spinner{width:32px;height:32px;border:3px solid #e0e0e0;border-top-color:#185FA5;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.share-box{background:#E6F1FB;border:.5px solid #85B7EB;border-radius:10px;padding:12px 16px;margin-bottom:16px}
.share-box .share-url{width:100%;padding:8px 10px;border:.5px solid #85B7EB;border-radius:6px;font-size:12px;background:#fff;outline:none;margin:8px 0}
@media(max-width:600px){
  .app-wrapper{padding:12px 8px}
  .search-box{width:100%}
  .toolbar{flex-direction:column;align-items:stretch}
  .compare-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="loading-overlay" class="loading-overlay">
  <div class="spinner"></div>
  <div>データを読み込んでいます...</div>
</div>
<div class="app-wrapper">
  <div class="app-header">
    <div>
      <h1><i class="ti ti-swimming" aria-hidden="true"></i> スポーツサイエンスデザイン</h1>
      <div class="subtitle">個人事業 管理アプリ</div>
    </div>
  </div>
  <div id="sync-bar" class="sync-bar" style="display:none;">
    <div class="sync-status">
      <span class="sync-dot ok" id="sync-dot"></span>
      <span id="sync-text">クラウド同期済み</span>
    </div>
    <div id="sync-buttons" style="display:flex;gap:6px;">
      <button style="font-size:11px;padding:4px 10px;" onclick="refreshFromCloud()"><i class="ti ti-refresh" aria-hidden="true"></i> 最新に更新</button>
      <button style="font-size:11px;padding:4px 10px;" onclick="showShareDialog()"><i class="ti ti-share" aria-hidden="true"></i> 共有URL</button>
      <button style="font-size:11px;padding:4px 10px;background:#FFF3E0;color:#854F0B;border-color:#F0B968;" onclick="showImportDialog()"><i class="ti ti-file-import" aria-hidden="true"></i> データ取り込み</button>
    </div>
    <div id="local-cloud-buttons" style="display:none;gap:6px;flex-direction:column;align-items:flex-end;">
      <button class="btn-primary" style="font-size:11px;padding:4px 12px;" onclick="copyDataToClipboard()"><i class="ti ti-copy" aria-hidden="true"></i> データをコピー（クラウドへ送る準備）</button>
      <div id="local-cloud-url" style="font-size:10px;color:#185FA5;word-break:break-all;max-width:300px;"></div>
    </div>
  </div>
  <div id="share-dialog" style="display:none;"></div>
  <div id="import-dialog" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:999;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:14px;padding:24px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;">
      <div style="font-weight:500;font-size:15px;margin-bottom:8px;"><i class="ti ti-file-import"></i> データ取り込み</div>
      <p style="font-size:12px;color:#888;margin-bottom:12px;">ローカルのアプリでコピーしたデータを下に貼り付けてください。</p>
      <textarea id="import-json" style="width:100%;height:180px;font-size:11px;padding:8px;border:.5px solid #ccc;border-radius:8px;font-family:monospace;resize:vertical;" placeholder="ここにデータを貼り付け..."></textarea>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn-primary" style="flex:1;" onclick="importAndSave()"><i class="ti ti-cloud-upload"></i> 取り込んでクラウドへ保存</button>
        <button style="flex:1;" onclick="document.getElementById('import-dialog').style.display='none';">キャンセル</button>
      </div>
      <div id="import-status" style="font-size:12px;margin-top:8px;"></div>
    </div>
  </div>
  <div class="top-tabs">
    <button class="top-tab" onclick="switchTopTab('business')" id="tab-business"><i class="ti ti-coin" aria-hidden="true"></i>個人事業</button>
    <button class="top-tab active" onclick="switchTopTab('lesson')" id="tab-lesson"><i class="ti ti-clipboard" aria-hidden="true"></i>個人レッスン</button>
  </div>
  <div id="app"></div>
  <div id="app-business" style="display:none;"></div>
</div>

function fetchWithTimeout(url,opts,ms=4000){
  const ctrl=new AbortController();
  const tm=setTimeout(()=>ctrl.abort(),ms);
  return fetch(url,{...opts,signal:ctrl.signal}).finally(()=>clearTimeout(tm));
}

function loadLocal(){
  clients=JSON.parse(localStorage.getItem('ssd_clients_v3')||'null')||defaultClients;
  // reviews・lessonDatesがlocalStorageにない場合はdefaultClients/LESSON_DATES_V1からマージ
  clients.forEach(c=>{
    if(!c.reviews||c.reviews.length===0){
      const def=defaultClients.find(d=>d.id===c.id);
      if(def&&def.reviews&&def.reviews.length>0) c.reviews=def.reviews;
    }
    if(!c.lessonDates||c.lessonDates.length===0){
      if(LESSON_DATES_V1[c.id]) c.lessonDates=LESSON_DATES_V1[c.id];
    }
    // followupsもdefaultClientsからマージ（日付で重複チェック）
    const def2=defaultClients.find(d=>d.id===c.id);
    if(def2&&def2.followups&&def2.followups.length>0){
      if(!c.followups) c.followups=[];
      def2.followups.forEach(df=>{
        if(!c.followups.find(f=>f.date===df.date)) c.followups.push(df);
      });
    }
  });
  localStorage.setItem('ssd_clients_v3',JSON.stringify(clients));
  incomeData=JSON.parse(localStorage.getItem('ssd_income_v1')||'null')||defaultIncome;
  // defaultIncomeにある月・項目がlocalStorageにない場合はマージする
  defaultIncome.forEach(dm=>{
    let m=incomeData.find(x=>x.month===dm.month);
    if(!m){incomeData.push(JSON.parse(JSON.stringify(dm)));return;}
    ['kanshi','lesson','other'].forEach(cat=>{
      (dm[cat]||[]).forEach(e=>{
        if(!m[cat]) m[cat]=[];
        if(!m[cat].find(x=>x.date===e.date&&x.desc===e.desc)) m[cat].push(e);
      });
    });
  });
  localStorage.setItem('ssd_income_v1',JSON.stringify(incomeData));
  expenseData=JSON.parse(localStorage.getItem('ssd_expense_v1')||'null')||defaultExpenses;
}

async function initCloud(){
  if(isLocal){
    loadLocal();
    updateSyncUI('ok','ローカルモード（データはこのPC内に保存されます）');
    document.getElementById('sync-buttons').style.display='none';
    document.getElementById('local-cloud-buttons').style.display='flex';
    finishInit();
    return;
  }
  try{
    if(blobId){
      updateSyncUI('saving','読み込み中...');
      const res=await fetchWithTimeout(BLOB_API+'/'+blobId,{});
      if(res.ok){
        const data=await res.json();
        clients=data.clients||defaultClients;
        incomeData=data.income||defaultIncome;
        expenseData=data.expenses||defaultExpenses;
        updateSyncUI('ok','クラウド同期済み');
      }else{
        loadLocal();blobId=null;
        updateSyncUI('error','読み込み失敗 - ローカルデータを使用');
      }
    }else{
      loadLocal();
      updateSyncUI('saving','クラウド作成中...');
      try{
        const body=JSON.stringify({clients,income:incomeData,expenses:expenseData});
        const res=await fetchWithTimeout(BLOB_API,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body});
        if(res.ok){
          const loc=res.headers.get('Location')||res.headers.get('x-jsonblob')||'';
          blobId=loc.split('/').pop();
          if(blobId){window.location.hash=blobId;updateSyncUI('ok','クラウド同期済み');}
          else updateSyncUI('error','ローカルで動作中');
        }else updateSyncUI('error','ローカルで動作中');
      }catch(e2){updateSyncUI('error','ローカルで動作中');}
    }
  }catch(e){
    console.error(e);
    loadLocal();
    updateSyncUI('error','オフライン - ローカルデータを使用');
  }
  finishInit();
}

function saveToCloud(){
  localStorage.setItem('ssd_clients_v3',JSON.stringify(clients));
  localStorage.setItem('ssd_income_v1',JSON.stringify(incomeData));
  localStorage.setItem('ssd_expense_v1',JSON.stringify(expenseData));
  if(!blobId)return;
  if(saveTimer)clearTimeout(saveTimer);
  updateSyncUI('saving','保存中...');
  saveTimer=setTimeout(async()=>{
    try{
      await fetch(BLOB_API+'/'+blobId,{
        method:'PUT',
        headers:{'Content-Type':'application/json','Accept':'application/json'},
        body:JSON.stringify({clients,income:incomeData,expenses:expenseData})
      });
      updateSyncUI('ok','クラウド同期済み');
    }catch(e){
      console.error(e);
      updateSyncUI('error','同期失敗');
    }
  },800);
}

async function importAndSave(){
  const raw=document.getElementById('import-json').value.trim();

  if(!raw){status.textContent='⚠️ データを貼り付けてください';return;}
  let data;
  try{data=JSON.parse(raw);}catch(e){status.textContent='⚠️ データの形式が正しくありません';return;}
  if(!data.clients){status.textContent='⚠️ 正しいデータではありません';return;}
  clients=data.clients;
  incomeData=data.income||defaultIncome;
  expenseData=data.expenses||defaultExpenses;
  localStorage.setItem('ssd_clients_v3',JSON.stringify(clients));
  localStorage.setItem('ssd_income_v1',JSON.stringify(incomeData));
  localStorage.setItem('ssd_expense_v1',JSON.stringify(expenseData));
  status.innerHTML='✅ データを取り込みました！クラウドへ保存中...';
  try{
    const body=JSON.stringify({clients,income:incomeData,expenses:expenseData});
    let res;
    if(blobId){
      res=await fetch(BLOB_API+'/'+blobId,{method:'PUT',headers:{'Content-Type':'application/json','Accept':'application/json'},body});
    }else{
      res=await fetch(BLOB_API,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body});
      if(res.ok){
        const loc=res.headers.get('Location')||'';
        blobId=loc.split('/').pop();
        if(blobId)window.location.hash=blobId;
      }
    }
    if(res&&res.ok){
      status.innerHTML='✅ クラウドへ保存完了！URLをコピーして共有できます。';
      updateSyncUI('ok','クラウド同期済み');
      setTimeout(()=>{document.getElementById('import-dialog').style.display='none';render();},1500);
    }else{
      status.innerHTML='✅ データ取り込み完了（クラウド保存は失敗）<br><span style="color:#888;font-size:11px;">このブラウザでは表示できます。「共有URL」ボタンから再試行してください。</span>';
      setTimeout(()=>{document.getElementById('import-dialog').style.display='none';render();},2000);
    }
  }catch(e){
    status.innerHTML='✅ データ取り込み完了（クラウド接続エラー）<br><span style="color:#888;font-size:11px;">このブラウザでは表示できます。しばらくしてから「共有URL」ボタンを押してください。</span>';
    setTimeout(()=>{document.getElementById('import-dialog').style.display='none';render();},2500);
  }
}

async function pushLocalToCloud(){
  const urlDiv=document.getElementById('local-cloud-url');
  const btn=document.querySelector('#local-cloud-buttons button');
  btn.disabled=true;
  btn.textContent='送信中...';
  urlDiv.textContent='';
  try{
    const body=JSON.stringify({clients,income:incomeData,expenses:expenseData});
    const savedId=localStorage.getItem('ssd_blob_id')||null;
    let res;
    if(savedId){
      res=await fetch(BLOB_API+'/'+savedId,{method:'PUT',headers:{'Content-Type':'application/json','Accept':'application/json'},body});
      if(res.ok){
        const url=location.href.split('#')[0]+'#'+savedId;
        urlDiv.innerHTML='✅ 保存完了！<br>共有URL：<a href="'+url+'" target="_blank" style="color:#185FA5;word-break:break-all;">'+url+'</a>';
        btn.textContent='✅ 保存完了';return;
      }
    }
    res=await fetch(BLOB_API,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body});
    if(res.ok){
      const loc=res.headers.get('Location')||res.headers.get('x-jsonblob')||'';
      const newId=loc.split('/').pop();
      if(newId){
        localStorage.setItem('ssd_blob_id',newId);
        const url=location.href.split('#')[0]+'#'+newId;

      }else{urlDiv.textContent='⚠️ ID取得失敗';btn.textContent='クラウドへ保存';}

  }catch(e){
    urlDiv.textContent='⚠️ エラー：'+e.message;

}

function parseDate(str){
  if(!str)return null;
  // supports 2026/7/11, 2026-07-11, 7/11 etc.
  const m=str.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(m)return{year:+m[1],month:+m[2],day:+m[3]};
  const m2=str.match(/(\d{1,2})[\/\-](\d{1,2})/);
  if(m2)return{year:calendarYear,month:+m2[1],day:+m2[2]};
  return null;
}

function renderCalendarView(){
  const y=calendarYear,mo=calendarMonth;
  const firstDay=new Date(y,mo-1,1).getDay();
  const daysInMonth=new Date(y,mo,0).getDate();
  // collect all lesson events for this month
  const events={};
  clients.forEach(c=>{
    (c.lessonDates||[]).forEach(ld=>{
      const d=parseDate(ld.date);
      if(!d)return;
      if(d.year===y&&d.month===mo){
        if(!events[d.day])events[d.day]=[];
        events[d.day].push({name:c.name,id:c.id,col:getColor(c.id)});
      }
    });
  });
  const dow=['日','月','火','水','木','金','土'];
  let cells='';
  for(let i=0;i<firstDay;i++) cells+=`<td style="background:#fafafa;border:.5px solid #eee;"></td>`;
  for(let d=1;d<=daysInMonth;d++){
    const today=new Date();
    const isToday=today.getFullYear()===y&&today.getMonth()+1===mo&&today.getDate()===d;
    const dayEvents=events[d]||[];
    cells+=`<td style="vertical-align:top;border:.5px solid #eee;padding:4px;min-height:60px;${isToday?'background:#FFF8E1;':'background:#fff;'}">
      <div style="font-size:11px;font-weight:${isToday?'600':'400'};color:${isToday?'#D85A30':'#444'};margin-bottom:2px;">${d}</div>
      ${dayEvents.map(e=>`<div onclick="selectedId=${e.id};activeSessionTab=0;lessonListView='list';render();" style="cursor:pointer;font-size:10px;background:${e.col.bg};color:${e.col.color};border-radius:4px;padding:1px 4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${e.name}</div>`).join('')}
    </td>`;
    if((firstDay+d)%7===0&&d<daysInMonth) cells+=`</tr><tr>`;
  }
  const remain=(firstDay+daysInMonth)%7;
  if(remain>0) for(let i=remain;i<7;i++) cells+=`<td style="background:#fafafa;border:.5px solid #eee;"></td>`;

  return`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <button onclick="calendarMonth--;if(calendarMonth<1){calendarMonth=12;calendarYear--;}render();" style="font-size:13px;padding:6px 14px;"><i class="ti ti-chevron-left" aria-hidden="true"></i></button>
      <div style="font-weight:500;font-size:16px;">${y}年${mo}月</div>
      <button onclick="calendarMonth++;if(calendarMonth>12){calendarMonth=1;calendarYear++;}render();" style="font-size:13px;padding:6px 14px;"><i class="ti ti-chevron-right" aria-hidden="true"></i></button>
    </div>
    <div style="overflow-x:auto;">
    <table style="width:100%;border-collapse:collapse;table-layout:fixed;">
      <tr>${dow.map((d,i)=>`<th style="padding:6px 2px;font-size:11px;color:${i===0?'#c0392b':i===6?'#185FA5':'#888'};text-align:center;border-bottom:2px solid #ddd;">${d}</th>`).join('')}</tr>
      <tr>${cells}</tr>
    </table></div>
    <p style="font-size:11px;color:#aaa;margin-top:8px;">※名前をクリックすると詳細が表示されます</p>`;
}

function renderMonthlyView(){
  // collect all lesson dates from all clients
  const allEvents=[];
  clients.forEach(c=>{
    (c.lessonDates||[]).forEach(ld=>{
      const d=parseDate(ld.date);
      allEvents.push({client:c,ld,parsed:d});
    });
  });
  // group by year-month
  const groups={};
  allEvents.forEach(ev=>{
    if(!ev.parsed)return;
    const key=`${ev.parsed.year}-${String(ev.parsed.month).padStart(2,'0')}`;
    if(!groups[key])groups[key]=[];
    groups[key].push(ev);
  });
  // sort keys desc
  const keys=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  if(keys.length===0)return`<p class="empty-msg">レッスン実施日が登録されていません</p>`;
  return keys.map(key=>{
    const [y,m]=key.split('-');
    const items=groups[key].sort((a,b)=>(a.parsed.day-b.parsed.day)||a.client.furigana.localeCompare(b.client.furigana,'ja'));
    return`<div class="month-card" style="margin-bottom:12px;">
      <div style="font-weight:500;font-size:15px;margin-bottom:10px;color:#185FA5;"><i class="ti ti-calendar-month" aria-hidden="true" style="margin-right:4px;"></i>${+y}年${+m}月 <span style="font-size:12px;color:#aaa;font-weight:400;">（${items.length}件）</span></div>
      ${items.map(ev=>{
        const col=getColor(ev.client.id);
        return`<div style="display:flex;align-items:center;gap:10px;padding:7px 4px;border-bottom:.5px solid #f0f0f0;cursor:pointer;" onclick="selectedId=${ev.client.id};activeSessionTab=0;lessonListView='list';render();">
          <div style="min-width:36px;text-align:center;font-size:13px;font-weight:500;color:#555;">${ev.parsed.day}日<span style="font-size:11px;color:#aaa;">${ev.ld.day?'('+ev.ld.day+')':''}</span></div>
          <div style="min-width:22px;text-align:center;font-size:11px;background:#E6F1FB;color:#185FA5;border-radius:4px;padding:1px 5px;">${ev.ld.count||''}回</div>

function renderReviewBlock(review,sessionIdx){

  const satStars=review.satisfaction==='非常に満足'?'★★★★★':review.satisfaction==='満足'?'★★★★☆':'★★★☆☆';
  return`
    <div class="review-card">
      <div class="rv-header"><i class="ti ti-star" aria-hidden="true" style="margin-right:4px;"></i>レッスン後の感想 <span style="font-weight:400;font-size:11px;color:#993556;margin-left:8px;">${review.date||''}</span></div>
      <div class="rv-field"><div class="rv-label">満足度</div><div class="star-rating">${satStars}</div><span style="font-size:12px;color:#72243E;margin-left:6px;">${review.satisfaction}</span></div>
      <div class="rv-field"><div class="rv-label">解説の分かりやすさ</div><div class="rv-value">${review.clarity}</div></div>
      ${review.impression?'<div class="rv-field"><div class="rv-label">一番印象に残ったこと</div><div class="rv-value">'+review.impression+'</div></div>':''}
      <div class="rv-field"><div class="rv-label">今後の練習への意識</div><div class="rv-value">${review.motivation}</div></div>
      ${review.recommend?'<div class="rv-field"><div class="rv-label">おすすめしたい方</div><div class="rv-value">'+review.recommend+'</div></div>':''}
      ${review.comments?'<div class="rv-field"><div class="rv-label">ご意見・ご要望</div><div class="rv-value">'+review.comments+'</div></div>':''}
      <div style="margin-top:10px;display:flex;gap:6px;">
        <button style="font-size:11px;padding:4px 10px;background:#fff;" onclick="editReviewBySession(${review.session})"><i class="ti ti-edit" aria-hidden="true"></i> 編集</button>
        <button style="font-size:11px;padding:4px 10px;background:#fff;color:#A32D2D;border-color:#F09595;" onclick="deleteReviewBySession(${review.session})"><i class="ti ti-trash" aria-hidden="true"></i> 削除</button>
      </div>
    </div>`;
}

function editReviewBySession(session){
  const c=clients.find(x=>x.id===selectedId);
  const idx=(c.reviews||[]).findIndex(r=>r.session===session);
  if(idx>=0){editingReview=idx;render();}
}
function deleteReviewBySession(session){
  if(!confirm('この感想を削除しますか？'))return;
  const c=clients.find(x=>x.id===selectedId);
  c.reviews=c.reviews.filter(r=>r.session!==session);
  save();render();
}

        <div class="form-group"><label>解説の分かりやすさ</label><select id="fr-clarity">${claOpts.map(o=>'<option'+(r.clarity===o?' selected':'')+'>'+o+'</option>').join('')}</select></div>

function saveReview(){
  const c=clients.find(x=>x.id===selectedId);
  if(!c.reviews)c.reviews=[];
  const data={
    session:parseInt(document.getElementById('fr-session').value)||1,
    date:document.getElementById('fr-date').value.replace(/-/g,'/'),
    satisfaction:document.getElementById('fr-satisfaction').value,
    clarity:document.getElementById('fr-clarity').value,
    impression:document.getElementById('fr-impression').value.trim(),
    motivation:document.getElementById('fr-motivation').value,
    recommend:document.getElementById('fr-recommend').value.trim(),
    comments:document.getElementById('fr-comments').value.trim()
  };
  if(editingReview==='new') c.reviews.push(data);
  else c.reviews[editingReview]=data;
  save();editingReview=null;
  activeSessionTab=data.session-1;
  render();
}

  };
  if(!data.name){alert('名前を入力してください');return}
  if(editingId==='new'){
    data.id=nextId++;data.followups=[];data.reviews=[];
    clients.push(data);selectedId=data.id;
  }else{
    const idx=clients.findIndex(x=>x.id===editingId);

  save();editingId=null;render();
}

let incomeEditState={};

function startAddEntry(idx,type,key){
  incomeEditState={[key]:{type:'add'}};
  renderBusiness();
  setTimeout(()=>{const el=document.getElementById('ie_date');if(el)el.focus();},50);
}
function startEditEntry(idx,type,ei){
  const key=`${idx}_${type}`;
  incomeEditState={[key]:{type:'edit',ei}};
  renderBusiness();
  setTimeout(()=>{const el=document.getElementById('ie_date');if(el)el.focus();},50);
}
function cancelEditEntry(key){
  delete incomeEditState[key];
  renderBusiness();
}
function saveAddEntry(monthIdx,type){
  const date=document.getElementById('ie_date').value.trim();
  const day=document.getElementById('ie_day').value.trim();
  const time=document.getElementById('ie_time').value.trim();
  const amount=parseInt(document.getElementById('ie_amount').value)||0;
  const desc=document.getElementById('ie_desc').value.trim();
  if(!date&&!amount){cancelEditEntry(`${monthIdx}_${type}`);return;}
  incomeData[monthIdx][type].push({date,day,time,amount,desc});
  incomeEditState={};
  saveIncome();renderBusiness();
}
function saveEditEntry(monthIdx,type,ei){
  const date=document.getElementById('ie_date').value.trim();
  const day=document.getElementById('ie_day').value.trim();
  const time=document.getElementById('ie_time').value.trim();
  const amount=parseInt(document.getElementById('ie_amount').value)||0;
  const desc=document.getElementById('ie_desc').value.trim();
  incomeData[monthIdx][type][ei]={date,day,time,amount,desc};
  incomeEditState={};
  saveIncome();renderBusiness();
}
function addEntry(monthIdx,type){
  startAddEntry(monthIdx,type,`${monthIdx}_${type}`);
}

function deleteEntry(monthIdx,type,entryIdx){
  if(!confirm('この項目を削除しますか？'))return;
  incomeData[monthIdx][type].splice(entryIdx,1);
  saveIncome();renderBusiness();
}

function addNewMonth(){
  const last=incomeData.length>0?incomeData[incomeData.length-1].month:'2026-06';
  const[y,mo]=last.split('-').map(Number);
  let ny=y,nm=mo+1;
  if(nm>12){nm=1;ny++;}
  const newMonth=ny+'-'+String(nm).padStart(2,'0');
  if(incomeData.find(m=>m.month===newMonth)){alert('この月は既に存在します');return;}
  incomeData.push({month:newMonth,kanshi:[],lesson:[],other:[]});
  incomeData.sort((a,b)=>a.month.localeCompare(b.month));
  expandedMonths[newMonth]=true;
  saveIncome();renderBusiness();
}

function drawChart(summaries){
  const canvas=document.getElementById('incomeChart');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.parentElement.clientWidth;
  const H=220;
  canvas.width=W;canvas.height=H;
  ctx.clearRect(0,0,W,H);

  const pad={t:24,r:20,b:30,l:60};
  const cw=W-pad.l-pad.r;
  const ch=H-pad.t-pad.b;
  const n=summaries.length;
  if(n===0)return;
  const maxVal=Math.max(...summaries.map(s=>s.total))*1.15;
  const barW=Math.min(50,cw/n*0.6);
  const gap=cw/n;

  ctx.strokeStyle='#e0e0e0';ctx.lineWidth=.5;
  for(let i=0;i<=4;i++){
    const y=pad.t+ch-ch*(i/4);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.fillStyle='#aaa';ctx.font='11px sans-serif';ctx.textAlign='right';
    ctx.fillText('¥'+Math.round(maxVal*i/4/1000)+'k',pad.l-6,y+4);
  }

  summaries.forEach((s,i)=>{
    const x=pad.l+gap*i+gap/2;
    const hK=ch*(s.kanshi/maxVal);
    const hL=ch*(s.lesson/maxVal);
    const hO=ch*(s.other/maxVal);
    let bottom=pad.t+ch;
    ctx.fillStyle='#85B7EB';
    ctx.fillRect(x-barW/2,bottom-hK-hL-hO,barW,hK);
    ctx.fillStyle='#97C459';
    ctx.fillRect(x-barW/2,bottom-hL-hO,barW,hL);
    ctx.fillStyle='#EF9F27';
    ctx.fillRect(x-barW/2,bottom-hO,barW,hO);
    ctx.fillStyle='#666';ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText(parseInt(s.month.split('-')[1])+'月',x,H-pad.b+16);
  });

  const leg=[{c:'#85B7EB',l:'監視業'},{c:'#97C459',l:'レッスン'},{c:'#EF9F27',l:'解説・講演会・その他'}];
  let lx=W;
  leg.slice().reverse().forEach(it=>{
    const tw=ctx.measureText(it.l).width;
    lx-=tw+22;
    ctx.fillStyle=it.c;ctx.fillRect(lx,6,12,12);
    ctx.fillStyle='#666';ctx.font='11px sans-serif';ctx.textAlign='left';
    ctx.fillText(it.l,lx+15,16);
  });
}

let expenseData=defaultExpenses;

function getExpCatTotals(entries){
  const t={};EXP_CATS.forEach(c=>{t[c.key]=0;});
  (entries||[]).forEach(e=>{t[e.c]=(t[e.c]||0)+e.a;});
  return t;
}

function renderExpenses(){
  const app=document.getElementById('biz-content');
  const catTotals={};EXP_CATS.forEach(c=>{catTotals[c.key]=0;});
  let grandTotal=0;
  const monthData=expenseData.map(m=>{
    const ct=getExpCatTotals(m.entries);
    const total=Object.values(ct).reduce((s,v)=>s+v,0);
    EXP_CATS.forEach(c=>{catTotals[c.key]+=ct[c.key];});
    grandTotal+=total;
    return{month:m.month,ct,total,entries:m.entries};
  });

  app.innerHTML=`
    <div class="stat-grid" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr));">
      <div class="stat"><div class="stat-label">経費合計</div><div class="stat-value" style="font-size:18px;color:#A32D2D;">${fmt(grandTotal)}</div></div>
      ${EXP_CATS.filter(c=>catTotals[c.key]>0).map(c=>`
        <div class="stat"><div class="stat-label">${c.name}</div><div class="stat-value" style="font-size:16px;color:${c.color};">${fmt(catTotals[c.key])}</div></div>
      `).join('')}
    </div>
    <div style="margin-bottom:16px;"><canvas id="expChart" height="220"></canvas></div>
    <div style="margin-bottom:16px;overflow-x:auto;">
      <table class="income-table" style="min-width:600px;">
        <tr><th>科目</th>${monthData.map(m=>`<th style="text-align:right;">${parseInt(m.month.split('-')[1])}月</th>`).join('')}<th style="text-align:right;background:#e8e8e8;">合計</th></tr>
        ${EXP_CATS.map(c=>{
          const rowTotal=catTotals[c.key];
          if(rowTotal===0)return'';
          return`<tr><td style="white-space:nowrap;color:${c.color};font-weight:500;">${c.name}</td>${monthData.map(m=>`<td class="amount">${m.ct[c.key]?fmt(m.ct[c.key]):'-'}</td>`).join('')}<td class="amount" style="font-weight:500;background:#f8f8f6;">${fmt(rowTotal)}</td></tr>`;
        }).join('')}
        <tr class="total-row"><td style="font-weight:500;">合計</td>${monthData.map(m=>`<td class="amount">${fmt(m.total)}</td>`).join('')}<td class="amount" style="background:#f0f0ee;">${fmt(grandTotal)}</td></tr>
      </table>
    </div>
    <div class="toolbar">
      <div style="font-weight:500;font-size:15px;"><i class="ti ti-calendar" aria-hidden="true"></i> 月別経費明細</div>
      <button class="btn-primary" onclick="addExpMonth()"><i class="ti ti-plus" aria-hidden="true"></i> 月を追加</button>
    </div>
    ${monthData.slice().reverse().map((m,ri)=>{
      const idx=monthData.length-1-ri;
      const expanded=expandedMonths['exp_'+m.month];
      return`<div class="month-card">
        <div class="month-header" onclick="expandedMonths['exp_${m.month}']=!expandedMonths['exp_${m.month}'];renderExpenses();">
          <h3>${monthLabel(m.month)}</h3>
          <div style="display:flex;align-items:center;gap:12px;">
            <span style="font-size:18px;font-weight:500;color:#A32D2D;">${fmt(m.total)}</span>
            <i class="ti ti-chevron-${expanded?'up':'down'}" style="color:#aaa;" aria-hidden="true"></i>
          </div>
        </div>
        ${expanded?renderExpMonthDetail(m,idx):`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;">${EXP_CATS.filter(c=>m.ct[c.key]>0).map(c=>'<span class="badge" style="background:#f0f0ee;color:'+c.color+';padding:4px 10px;">'+c.name+' '+fmt(m.ct[c.key])+'</span>').join('')}</div>`}
      </div>`;
    }).join('')}`;
  drawExpChart(monthData);
}

function renderExpMonthDetail(m,idx){
  let html='<div style="margin-top:8px;">';
  EXP_CATS.forEach(cat=>{
    const items=(m.entries||[]).filter(e=>e.c===cat.key);
    if(items.length===0)return;
    const catTotal=items.reduce((s,e)=>s+e.a,0);
    const catExpKey='exp_'+m.month+'_'+cat.key;
    const open=expandedExpCats[catExpKey];
    html+=`<div style="margin-bottom:8px;border:.5px solid #e8e8e8;border-radius:8px;overflow:hidden;">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#f8f8f6;cursor:pointer;border-left:3px solid ${cat.color};" onclick="expandedExpCats['${catExpKey}']=!expandedExpCats['${catExpKey}'];renderExpenses();">
        <div style="display:flex;align-items:center;gap:8px;">
          <i class="ti ti-${cat.icon}" style="font-size:15px;color:${cat.color};" aria-hidden="true"></i>
          <span style="font-size:13px;font-weight:500;color:${cat.color};">${cat.name}</span>
          <span style="font-size:11px;color:#aaa;">${items.length}件</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:15px;font-weight:500;">${fmt(catTotal)}</span>
          <i class="ti ti-chevron-${open?'up':'down'}" style="font-size:14px;color:#bbb;" aria-hidden="true"></i>
        </div>
      </div>
      ${open?`<div style="padding:0;">
        <table class="income-table" style="margin:0;">
        <tr><th style="width:45%;">内容</th><th style="width:20%;text-align:right;">金額</th><th style="width:15%;">支払</th><th style="width:20%;text-align:right;"></th></tr>
        ${items.map(e=>{
          const ri=(m.entries||[]).indexOf(e);
          const editing=expEditTarget&&expEditTarget.mi===idx&&expEditTarget.ei===ri;
          if(editing) return renderExpEditRow(idx,ri,e,cat);
          return`<tr>
            <td style="font-size:12px;">${e.d}</td>
            <td class="amount" style="font-size:12px;">${fmt(e.a)}</td>
            <td style="font-size:12px;">${e.p}</td>
            <td style="text-align:right;">
              <i class="ti ti-edit" style="font-size:13px;color:#aaa;cursor:pointer;margin-right:6px;" onclick="startEditExp(${idx},${ri})" aria-hidden="true"></i>
              <i class="ti ti-trash" style="font-size:13px;color:#ccc;cursor:pointer;" onclick="deleteExpEntry(${idx},${ri})" aria-hidden="true"></i>
            </td></tr>`;
        }).join('')}
        <tr class="total-row"><td>小計</td><td class="amount">${fmt(catTotal)}</td><td colspan="2"></td></tr>
        </table>
      </div>`:''}
    </div>`;
  });
  html+=`<div style="margin-top:12px;padding:12px;background:#f8f8f6;border-radius:8px;" id="exp-add-area-${idx}">
    <div style="font-size:12px;font-weight:500;margin-bottom:8px;color:#666;"><i class="ti ti-plus" aria-hidden="true"></i> 経費を追加</div>
    <div style="display:grid;grid-template-columns:1fr 1.5fr 90px 60px auto;gap:6px;align-items:end;">
      <div class="form-group" style="margin:0;"><label style="font-size:11px;">科目</label>
        <select id="exp-add-cat-${idx}" style="font-size:12px;padding:6px;">
          ${EXP_CATS.map(c=>'<option value="'+c.key+'">'+c.name+'</option>').join('')}
        </select>
      </div>
      <div class="form-group" style="margin:0;"><label style="font-size:11px;">内容</label>
        <input id="exp-add-desc-${idx}" placeholder="例: ガソリン代" style="font-size:12px;padding:6px;">
      </div>
      <div class="form-group" style="margin:0;"><label style="font-size:11px;">金額</label>
        <input id="exp-add-amt-${idx}" type="number" placeholder="3000" style="font-size:12px;padding:6px;">
      </div>
      <div class="form-group" style="margin:0;"><label style="font-size:11px;">支払</label>
        <select id="exp-add-pay-${idx}" style="font-size:12px;padding:6px;">
          <option>瑞</option><option>享</option>
        </select>
      </div>
      <button class="btn-primary" style="font-size:12px;padding:6px 12px;height:36px;" onclick="submitAddExp(${idx})"><i class="ti ti-plus" aria-hidden="true"></i></button>
    </div>
  </div>
  <div style="text-align:right;margin-top:8px;font-weight:500;font-size:14px;">月合計: ${fmt(m.total)}</div>
  </div>`;
  return html;
}

let expEditTarget=null;

function renderExpEditRow(mi,ei,e,cat){
  return`<tr style="background:#FAEEDA;">
    <td><input id="exp-ed-d" value="${esc(e.d)}" style="font-size:12px;padding:4px 6px;width:100%;"></td>
    <td><input id="exp-ed-a" type="number" value="${e.a}" style="font-size:12px;padding:4px 6px;width:100%;text-align:right;"></td>
    <td><select id="exp-ed-p" style="font-size:12px;padding:4px 6px;">
      <option${e.p==='瑞'?' selected':''}>瑞</option><option${e.p==='享'?' selected':''}>享</option>
    </select></td>
    <td style="text-align:right;">
      <button class="btn-primary" style="font-size:11px;padding:2px 8px;margin-right:2px;" onclick="saveEditExp(${mi},${ei})"><i class="ti ti-check" aria-hidden="true"></i></button>
      <button style="font-size:11px;padding:2px 8px;" onclick="cancelEditExp()"><i class="ti ti-x" aria-hidden="true"></i></button>
    </td></tr>`;
}

function startEditExp(mi,ei){expEditTarget={mi,ei};renderExpenses();}
function cancelEditExp(){expEditTarget=null;renderExpenses();}

function saveEditExp(mi,ei){
  const e=expenseData[mi].entries[ei];
  e.d=document.getElementById('exp-ed-d').value.trim()||e.d;
  e.a=parseInt(document.getElementById('exp-ed-a').value)||e.a;
  e.p=document.getElementById('exp-ed-p').value;
  expEditTarget=null;
  saveExpenses();renderExpenses();
}

function submitAddExp(idx){
  const cat=document.getElementById('exp-add-cat-'+idx).value;
  const desc=document.getElementById('exp-add-desc-'+idx).value.trim();
  const amt=parseInt(document.getElementById('exp-add-amt-'+idx).value)||0;
  const pay=document.getElementById('exp-add-pay-'+idx).value;
  if(!desc||!amt){alert('内容と金額を入力してください');return;}
  if(!expenseData[idx].entries)expenseData[idx].entries=[];
  expenseData[idx].entries.push({a:amt,c:cat,d:desc,p:pay});
  const catExpKey='exp_'+expenseData[idx].month+'_'+cat;
  expandedExpCats[catExpKey]=true;
  saveExpenses();renderExpenses();
}

function deleteExpEntry(monthIdx,entryIdx){
  if(!confirm('この経費を削除しますか？'))return;
  expenseData[monthIdx].entries.splice(entryIdx,1);
  saveExpenses();renderExpenses();
}

function addExpMonth(){
  const last=expenseData.length>0?expenseData[expenseData.length-1].month:'2026-06';
  const[y,mo]=last.split('-').map(Number);
  let ny=y,nm=mo+1;if(nm>12){nm=1;ny++;}
  const newMonth=ny+'-'+String(nm).padStart(2,'0');
  if(expenseData.find(m=>m.month===newMonth)){alert('この月は既に存在します');return;}
  expenseData.push({month:newMonth,entries:[]});
  expenseData.sort((a,b)=>a.month.localeCompare(b.month));
  expandedMonths['exp_'+newMonth]=true;
  saveExpenses();renderExpenses();
}

function saveExpenses(){saveToCloud()}

function drawExpChart(months){
  const canvas=document.getElementById('expChart');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.parentElement.clientWidth;
  const H=220;
  canvas.width=W;canvas.height=H;
  ctx.clearRect(0,0,W,H);

  const pad={t:24,r:20,b:30,l:60};
  const cw=W-pad.l-pad.r;
  const ch=H-pad.t-pad.b;
  const n=months.length;
  if(n===0)return;
  const maxVal=Math.max(...months.map(m=>m.total))*1.15||1;
  const barW=Math.min(50,cw/n*0.6);
  const gap=cw/n;
  const catColors=['#85B7EB','#AFA9EC','#5DCAA5','#F0997B','#ED93B1','#EF9F27'];

  ctx.strokeStyle='#e0e0e0';ctx.lineWidth=.5;
  for(let i=0;i<=4;i++){
    const y=pad.t+ch-ch*(i/4);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.fillStyle='#aaa';ctx.font='11px sans-serif';ctx.textAlign='right';
    ctx.fillText('¥'+Math.round(maxVal*i/4/1000)+'k',pad.l-6,y+4);
  }

  months.forEach((m,i)=>{
    const x=pad.l+gap*i+gap/2;
    let bottom=pad.t+ch;
    EXP_CATS.slice().reverse().forEach((c,ci)=>{
      const val=(m.ct||{})[c.key]||0;
      if(val===0)return;
      const h=ch*(val/maxVal);
      ctx.fillStyle=catColors[EXP_CATS.length-1-ci];
      bottom-=h;
      ctx.fillRect(x-barW/2,bottom,barW,h);
    });
    ctx.fillStyle='#666';ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText(parseInt(m.month.split('-')[1])+'月',x,H-pad.b+16);
  });

  let lx=W;
  EXP_CATS.filter((_,i)=>{
    return months.some(m=>(m.ct||{})[EXP_CATS[i].key]>0);
  }).reverse().forEach((c,ci)=>{
    const origIdx=EXP_CATS.indexOf(c);
    const tw=ctx.measureText(c.name).width;
    lx-=tw+22;
    ctx.fillStyle=catColors[origIdx];ctx.fillRect(lx,6,12,12);
    ctx.fillStyle='#666';ctx.font='10px sans-serif';ctx.textAlign='left';
    ctx.fillText(c.name,lx+15,15);
  });
}
